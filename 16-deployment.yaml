apiVersion: apps/v1
kind: Deployment 
metadata:
  name: nginx-Deployment
  # deployment labels
  labels: 
    purpose: deployment-demo
    project: roboshop
    environment: dev
    tier: fromtend
    component: nginx
spec:
  replicas: 3
  # These are the labels replica set use to create pod replicas, this should match pod labels
  selector:
    matchLabels:
      purpose: deployment-demo
      project: roboshop
      environment: dev
      tier: fromtend
      component: nginx
  # This is pod definition
  template:
    metadata:
      labels: 
        purpose: deployment-demo
        project: roboshop
        environment: dev
        tier: fromtend
        component: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:stable-perl